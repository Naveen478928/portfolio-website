<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naveen Portfolio</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      padding-top: 70px; /* prevent navbar overlap */
    }

    section {
      padding: 80px 0;
      scroll-margin-top: 70px;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .project-card {
      transition: 0.3s;
    }

    .project-card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#home">My Portfolio</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
        <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Home -->
<section id="home" class="hero">
  <div>
    <h1>Hello, I'm Naveen</h1>
    <p>Web Developer | Student</p>
  </div>
</section>

<!-- Skills -->
<section id="skills">
  <div class="container text-center">
    <h2>Skills</h2>
    <div class="row mt-4">
      <div class="col-md-4">HTML</div>
      <div class="col-md-4">CSS</div>
      <div class="col-md-4">JavaScript</div>
    </div>
  </div>
</section>

<!-- Projects -->
<section id="projects" class="bg-light">
  <div class="container text-center">
    <h2>Projects</h2>
    <div class="row mt-4">

      <div class="col-md-4 mb-3">
        <div class="card project-card p-3">
          <h5>Project 1</h5>
          <p>Portfolio Website</p>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card project-card p-3">
          <h5>Project 2</h5>
          <p>User Search App</p>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="card project-card p-3">
          <h5>Project 3</h5>
          <p>API Based App</p>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- Contact -->
<section id="contact">
  <div class="container text-center">
    <h2>Contact Me</h2>
    <form onsubmit="handleSubmit(event)" class="mt-4">
      <input type="text" class="form-control mb-2" placeholder="Name" required>
      <input type="email" class="form-control mb-2" placeholder="Email" required>
      <textarea class="form-control mb-2" placeholder="Message" required></textarea>
      <button class="btn btn-dark">Send</button>
    </form>
    <p id="msg" class="mt-2"></p>
  </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
  © 2026 Naveen Portfolio
</footer>

<script>
function handleSubmit(e) {
  e.preventDefault();
  document.getElementById("msg").innerText = "Message sent successfully!";
}

/* Close navbar on mobile after click */
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', () => {
    const menu = document.querySelector('.navbar-collapse');
    if (menu.classList.contains('show')) {
      new bootstrap.Collapse(menu).hide();
    }
  });
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
